<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gato</title>

    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 20px;
            color: #00e5ff;
        }

        #game {
            margin-top: 30px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 10px;
            justify-content: center;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: #2e2e4d;
            border-radius: 10px;
            font-size: 2em;
        }

        #results {
            margin-top: 20px;
            font-size: 18px;
            color: #ffd700;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #00e5ff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #00bcd4;
        }
    </style>

</head>
<body>

    <h1>Gato</h1>

    <div id="game">

        <div id="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
        </div>

        <div id="results">
            Turno de: X
        </div>

        <button>Reiniciar</button>

    </div>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gato</title>
</head>
<body>
    <div id="game">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div id="results"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
